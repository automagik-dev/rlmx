name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    if: "!startsWith(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: ver
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BASE=$(jq -r '.version' package.json)
          TAG="v${BASE}"

          if gh release view "${TAG}" > /dev/null 2>&1; then
            echo "Release ${TAG} already exists — deriving hotfix version."
            TODAY=$(date -u +%y%m%d)
            EXISTING=$(gh release list --limit 100 --json tagName \
              -q "[.[].tagName | select(startswith(\"v0.${TODAY}.\"))] | length")
            BUILD=$((EXISTING + 1))
            VERSION="0.${TODAY}.${BUILD}"
            echo "hotfix=true" >> "$GITHUB_OUTPUT"
          else
            VERSION="${BASE}"
            echo "hotfix=false" >> "$GITHUB_OUTPUT"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Find previous release tag
        id: prev
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          PREV=$(gh release list --limit 50 --json tagName -q '.[].tagName' | grep -v "^${TAG}$" | head -1)
          if [ -n "$PREV" ] && git merge-base --is-ancestor "$PREV" HEAD 2>/dev/null; then
            echo "tag=${PREV}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: cliff
        if: steps.prev.outputs.tag != ''
        with:
          config: cliff.toml
          args: ${{ format('{0}..HEAD', steps.prev.outputs.tag) }}
        env:
          GITHUB_REPO: ${{ github.repository }}

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_NOTES: ${{ steps.cliff.outputs.content }}
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          if [ -z "$RELEASE_NOTES" ]; then
            RELEASE_NOTES="Initial release of rlmx."
          fi
          printf '%s' "$RELEASE_NOTES" > /tmp/release-notes.md
          if gh release view "${TAG}" > /dev/null 2>&1; then
            echo "Release ${TAG} already exists — skipping creation"
          else
            gh release create "${TAG}" \
              --target "${{ github.sha }}" \
              --title "${TAG}" \
              --notes-file /tmp/release-notes.md
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Patch version for hotfix
        if: steps.ver.outputs.hotfix == 'true'
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          jq --arg v "$VERSION" '.version = $v' package.json > package.json.tmp
          mv package.json.tmp package.json

      - name: Build
        run: npm run build

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "ERROR: NPM_TOKEN secret is not set." >&2
            exit 1
          fi
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > ~/.npmrc
          VERSION="${{ steps.ver.outputs.version }}"
          if ! npm publish --access public 2>&1; then
            echo "Publish failed — retagging as latest..."
            npm dist-tag add "@automagik/rlmx@${VERSION}" latest
          fi
